<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#f5f5f5">
    <title>KVM Dongle - Connessioni</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        :root { --bg: #f5f5f5; --surface: #ffffff; --border: #e0e0e0; --accent: #007aff; --green: #34c759; --yellow: #ffcc00; --red: #ff3b30; --text: #1c1c1e; --muted: #8e8e93; --radius: 12px; --shadow: 0 2px 12px rgba(0,0,0,0.08); --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .app { max-width: 500px; width: 100%; margin: 0 auto; }
        .card { background: var(--surface); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); margin-bottom: 16px; }
        .card h1 { font-size: 22px; color: var(--accent); margin-bottom: 4px; }
        .card .subtitle { font-size: 14px; color: var(--muted); margin-bottom: 20px; }
        .connection-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 16px 0; }
        .connection-btn { padding: 16px 8px; border: 2px solid var(--border); border-radius: var(--radius); background: var(--surface); cursor: pointer; text-align: center; transition: all 0.2s; }
        .connection-btn:active { transform: scale(0.95); }
        .connection-btn .icon { font-size: 28px; display: block; margin-bottom: 6px; }
        .connection-btn .label { font-size: 12px; font-weight: 600; color: var(--text); }
        .connection-btn .status { font-size: 10px; color: var(--muted); margin-top: 4px; }
        .connection-btn.active { border-color: var(--accent); background: #e8f2ff; }
        .connection-btn.active .label { color: var(--accent); }
        .connection-btn.connected { border-color: var(--green); background: #e8f5e9; }
        .connection-btn.connected .label { color: var(--green); }
        .connection-btn.error { border-color: var(--red); background: #ffebee; }
        .connection-btn.error .label { color: var(--red); }
        .connection-btn.disabled { opacity: 0.4; pointer-events: none; }
        .status-bar { background: var(--surface); border-radius: var(--radius); padding: 12px 16px; box-shadow: var(--shadow); display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
        .status-bar .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; }
        .status-bar .dot.off { background: var(--muted); }
        .status-bar .dot.on { background: var(--green); }
        .status-bar .dot.error { background: var(--red); }
        .status-bar .dot.searching { background: var(--yellow); animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .btn { padding: 10px 20px; border: none; border-radius: var(--radius); font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn:active { transform: scale(0.95); }
        .btn-primary { background: var(--accent); color: white; }
        .btn-success { background: var(--green); color: white; }
        .btn-danger { background: var(--red); color: white; }
        .btn-secondary { background: var(--border); color: var(--text); }
        .btn-full { width: 100%; padding: 14px; }
        .btn-sm { padding: 6px 12px; font-size: 12px; }
        .wifi-config { margin-top: 12px; padding: 16px; background: #f8f8f8; border-radius: var(--radius); display: none; }
        .wifi-config.show { display: block; }
        .wifi-config input { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; margin-bottom: 8px; background: white; }
        .wifi-config input:focus { outline: none; border-color: var(--accent); }
        .wifi-config .row { display: flex; gap: 8px; }
        .wifi-config .row input { flex: 1; }
        .hidden { display: none !important; }
        .log { background: var(--surface); border-radius: var(--radius); padding: 8px 12px; height: 40px; overflow-y: auto; font-family: monospace; font-size: 10px; color: var(--muted); border: 1px solid var(--border); margin-top: 8px; line-height: 1.6; }
        .back-btn { display: inline-flex; align-items: center; gap: 6px; color: var(--accent); font-size: 14px; font-weight: 600; cursor: pointer; padding: 8px 0; background: none; border: none; }
        .back-btn:active { opacity: 0.6; }
        .wifi-networks { max-height: 120px; overflow-y: auto; margin-top: 8px; }
        .wifi-networks .net { display: flex; justify-content: space-between; align-items: center; padding: 6px 8px; border-bottom: 1px solid var(--border); font-size: 12px; }
        .wifi-networks .net .ssid { font-weight: 500; }
        .wifi-networks .net .btn-sm { padding: 2px 10px; font-size: 10px; }
        #scanResults .net { display: flex; justify-content: space-between; align-items: center; padding: 6px 8px; border-bottom: 1px solid var(--border); font-size: 12px; }
        #scanResults .net .ssid { font-weight: 500; }
        #scanResults .net .btn-sm { padding: 2px 10px; font-size: 10px; }
        @media (prefers-color-scheme: dark) {
            :root { --bg: #1c1c1e; --surface: #2c2c2e; --border: #3a3a3c; --text: #f5f5f5; --muted: #98989e; --shadow: 0 2px 12px rgba(0,0,0,0.3); }
            .wifi-config { background: #1a1a1c; }
            .wifi-config input { background: #2c2c2e; color: #f5f5f5; border-color: #3a3a3c; }
            .connection-btn.active { background: #1a2a3a; }
            .connection-btn.connected { background: #1a3a2a; }
        }
    </style>
</head>
<body>

<div class="app" id="app">
    <!-- SCHERMATA CONNESSIONI -->
    <div id="screen-connection">
        <div class="card">
            <h1>🔌 KVM <span style="color:var(--accent);">Dongle</span></h1>
            <div class="subtitle">Scegli la modalità di connessione</div>
            
            <div class="connection-grid">
                <div class="connection-btn" id="btnBLE" onclick="connectBLE()">
                    <span class="icon">🔵</span>
                    <span class="label">BLE</span>
                    <span class="status" id="statusBLE">Non connesso</span>
                </div>
                <div class="connection-btn" id="btnWiFi" onclick="connectWiFi()">
                    <span class="icon">📶</span>
                    <span class="label">WiFi</span>
                    <span class="status" id="statusWiFi">Non connesso</span>
                </div>
                <div class="connection-btn" id="btnAP" onclick="connectAP()">
                    <span class="icon">📡</span>
                    <span class="label">Access Point</span>
                    <span class="status" id="statusAP">Non connesso</span>
                </div>
            </div>
            
            <div id="wifiConfig" class="wifi-config">
                <div class="row">
                    <input type="text" id="wifiSsid" placeholder="SSID rete WiFi">
                    <input type="password" id="wifiPass" placeholder="Password">
                </div>
                <button class="btn btn-success btn-full" onclick="connectWiFiNetwork()">🔗 Connetti</button>
                
                <div style="margin-top:10px;">
                    <button class="btn btn-secondary btn-full" onclick="scanNetworks()" style="font-size:12px;">📡 Scansiona reti</button>
                    <div id="scanResults"></div>
                </div>
                
                <div style="margin-top:10px;">
                    <div style="font-size:11px;color:var(--muted);font-weight:600;margin-bottom:4px;">📋 Reti salvate</div>
                    <div class="wifi-networks" id="wifiNetworks"></div>
                </div>
            </div>
            
            <div style="margin-top:12px;">
                <button class="btn btn-primary btn-full" onclick="goToKVM()" id="btnGoToKVM" disabled>
                    🖥️ Vai al KVM
                </button>
            </div>
        </div>
        
        <div class="status-bar">
            <span>
                <span class="dot" id="statusDot"></span>
                <span id="statusText">In attesa di connessione...</span>
            </span>
            <span id="statusDetail" style="font-size:11px;color:var(--muted);"></span>
        </div>
        
        <div class="log" id="log">▶ KVM v5.28 — Seleziona una connessione</div>
    </div>
    
    <!-- SCHERMATA KVM (verrà caricata dinamicamente) -->
    <div id="screen-kvm" class="hidden">
        <div class="card" style="padding:12px 16px;">
            <div style="display:flex;justify-content:space-between;align-items:center;">
                <button class="back-btn" onclick="goToConnection()">← Torna alle connessioni</button>
                <span id="kvmStatus" style="font-size:11px;color:var(--muted);">📡 Connesso</span>
            </div>
        </div>
        <div id="kvmContent">
            <!-- Qui verrà caricata l'interfaccia KVM completa -->
            <div style="text-align:center;padding:40px;color:var(--muted);">
                ⏳ Caricamento interfaccia KVM...
            </div>
        </div>
        <div class="log" id="kvmLog">▶ KVM v5.28 — Pronto</div>
    </div>
</div>

<script>
// ============================================================
// STATO GLOBALE
// ============================================================
let connectionMode = null; // 'ble', 'wifi', 'ap'
let isConnected = false;
let kvmLoaded = false;
let bleDevice = null, bleRx = null, bleTx = null, bleConnected = false;
let wifiIP = null;
let apIP = '192.168.4.1';
let bleChunkBuffer = { macro: '', cred: '' };
let macroCustom = [];
let credenziali = [];
let holdMods = {};
let capsLockActive = false;
let holdTouch = false, holdTouchBtn = null;
let pointers = {}, lastTap = 0;
let lastMoveTime = 0, stopTimeout = null;
let velocityHistory = [];
const VELOCITY_SAMPLES = 5;
let accumulatedX = 0, accumulatedY = 0, stopSent = false;
let sens = 4, minMovement = 5, sendInterval = 80;
let holdGlobalActive = false;

// ============================================================
// LOG
// ============================================================
function log(msg) {
    const el = document.getElementById('log');
    if (!el) return;
    const lines = el.textContent.split('\n');
    if (lines.length > 30) {
        el.textContent = lines.slice(-20).join('\n') + '\n' + msg;
    } else {
        el.textContent += '\n' + msg;
    }
    el.scrollTop = el.scrollHeight;
}

function kvmLog(msg) {
    const el = document.getElementById('kvmLog');
    if (!el) return;
    const lines = el.textContent.split('\n');
    if (lines.length > 30) {
        el.textContent = lines.slice(-20).join('\n') + '\n' + msg;
    } else {
        el.textContent += '\n' + msg;
    }
    el.scrollTop = el.scrollHeight;
}

function updateStatus(text, detail, dotState) {
    document.getElementById('statusText').textContent = text;
    document.getElementById('statusDetail').textContent = detail || '';
    const dot = document.getElementById('statusDot');
    dot.className = 'dot ' + (dotState || 'off');
}

// ============================================================
// NAVIGAZIONE
// ============================================================
function goToKVM() {
    if (!isConnected) {
        log('❌ Nessuna connessione attiva');
        return;
    }
    document.getElementById('screen-connection').classList.add('hidden');
    document.getElementById('screen-kvm').classList.remove('hidden');
    if (!kvmLoaded) {
        loadKVMInterface();
    }
}

function goToConnection() {
    document.getElementById('screen-kvm').classList.add('hidden');
    document.getElementById('screen-connection').classList.remove('hidden');
    // Se siamo in WiFi, aggiorna stato
    if (connectionMode === 'wifi' || connectionMode === 'ap') {
        updateWiFiStatus();
    }
}

// ============================================================
// CARICA INTERFACCIA KVM
// ============================================================
function loadKVMInterface() {
    // L'interfaccia KVM è già nella pagina, ma la mostriamo
    // In realtà, per evitare duplicazioni, caricheremo il contenuto KVM qui
    // Per semplicità, mostriamo che è caricata
    kvmLoaded = true;
    document.getElementById('kvmContent').innerHTML = `
        <div style="background:var(--surface);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);">
            <div style="font-size:12px;color:var(--muted);margin-bottom:8px;">📡 Connessione: <strong>${connectionMode.toUpperCase()}</strong></div>
            <!-- Qui andrebbe l'interfaccia KVM completa -->
            <div style="text-align:center;padding:20px;color:var(--muted);">
                🖥️ Interfaccia KVM caricata<br>
                <span style="font-size:11px;">Modalità: ${connectionMode.toUpperCase()}</span>
            </div>
        </div>
    `;
    // Nota: Per avere l'interfaccia KVM completa, dovresti includere qui
    // tutto il codice HTML della tua pagina KVM originale.
    // Per brevità, qui mostro solo lo scheletro.
    kvmLog('✅ Interfaccia KVM caricata in modalità ' + connectionMode.toUpperCase());
}

// ============================================================
// BLE CONNESSIONE
// ============================================================
async function connectBLE() {
    if (bleConnected) {
        if (bleDevice) bleDevice.gatt.disconnect();
        return;
    }
    
    const btn = document.getElementById('btnBLE');
    btn.classList.add('active');
    document.getElementById('statusBLE').textContent = 'Ricerca...';
    updateStatus('Ricerca BLE...', 'Cerca dispositivo', 'searching');
    log('🔍 Ricerca dispositivo BLE...');
    
    try {
        bleDevice = await navigator.bluetooth.requestDevice({
            filters: [{ services: ['6e400001-b5a3-f393-e0a9-e50e24dcca9e'] }]
        });
        bleDevice.addEventListener('gattserverdisconnected', onBLEDisconnect);
        const srv = await bleDevice.gatt.connect();
        const svc = await srv.getPrimaryService('6e400001-b5a3-f393-e0a9-e50e24dcca9e');
        bleRx = await svc.getCharacteristic('6e400002-b5a3-f393-e0a9-e50e24dcca9e');
        bleTx = await svc.getCharacteristic('6e400003-b5a3-f393-e0a9-e50e24dcca9e');
        await bleTx.startNotifications();
        
        bleTx.addEventListener('characteristicvaluechanged', e => {
            const data = new TextDecoder().decode(e.target.value).trim();
            console.log("🔵 BLE ricevuto:", data);
            handleBLEResponse(data);
        });
        
        bleConnected = true;
        connectionMode = 'ble';
        isConnected = true;
        document.getElementById('btnBLE').classList.add('connected');
        document.getElementById('statusBLE').textContent = '✅ Connesso';
        document.getElementById('btnGoToKVM').disabled = false;
        updateStatus('BLE Connesso', '✅', 'on');
        log('✅ BLE Connesso');
        
        setTimeout(() => {
            sendBLE('MACRO_LIST');
            setTimeout(() => sendBLE('CRED_LIST'), 500);
            setTimeout(() => sendBLE('WIFI_STATUS'), 1000);
        }, 1500);
        
    } catch (e) {
        document.getElementById('btnBLE').classList.remove('active');
        document.getElementById('statusBLE').textContent = '❌ Errore';
        updateStatus('BLE Errore', e.message, 'error');
        log('❌ BLE Errore: ' + e.message);
    }
}

function onBLEDisconnect() {
    bleConnected = false;
    bleRx = null;
    bleTx = null;
    if (connectionMode === 'ble') {
        isConnected = false;
        document.getElementById('btnGoToKVM').disabled = true;
    }
    document.getElementById('btnBLE').classList.remove('connected', 'active');
    document.getElementById('statusBLE').textContent = 'Disconnesso';
    updateStatus('BLE Disconnesso', '⚠️', 'error');
    log('⚠️ BLE Disconnesso');
}

function sendBLE(cmd) {
    if (!bleConnected || !bleRx) {
        log('❌ BLE non connesso');
        return;
    }
    try {
        bleRx.writeValue(new TextEncoder().encode(cmd + '\n'));
        if (!cmd.startsWith('M:')) {
            log('📶 BLE ▶ ' + cmd.substring(0, 50) + (cmd.length > 50 ? '…' : ''));
        }
    } catch (e) {
        log('❌ Errore invio BLE: ' + e.message);
    }
}

// ============================================================
// WIFI CONNESSIONE
// ============================================================
function connectWiFi() {
    document.getElementById('wifiConfig').classList.toggle('show');
    document.getElementById('wifiSsid').focus();
    // Se abbiamo già un IP salvato, lo usiamo
    const savedIP = localStorage.getItem('kvm_wifi_ip');
    if (savedIP) {
        document.getElementById('wifiSsid').placeholder = 'IP: ' + savedIP;
    }
}

function connectWiFiNetwork() {
    const ssid = document.getElementById('wifiSsid').value.trim();
    const pass = document.getElementById('wifiPass').value.trim();
    if (!ssid) {
        // Se non c'è SSID, potrebbe essere un IP già connesso
        const savedIP = localStorage.getItem('kvm_wifi_ip');
        if (savedIP) {
            wifiIP = savedIP;
            setWiFiConnected();
            return;
        }
        log('❌ Inserisci SSID o IP');
        return;
    }
    
    // Se sembra un IP (contiene punti), usalo direttamente
    if (ssid.match(/^\d+\.\d+\.\d+\.\d+$/)) {
        wifiIP = ssid;
        localStorage.setItem('kvm_wifi_ip', wifiIP);
        setWiFiConnected();
        return;
    }
    
    // Altrimenti, invia comando di connessione
    log('📡 Connessione a ' + ssid + '...');
    document.getElementById('wifiSsid').value = '';
    document.getElementById('wifiPass').value = '';
    
    // Se siamo in BLE, invia comando WiFi
    if (bleConnected) {
        sendBLE('WIFI_CONNECT:' + ssid + '|' + pass);
        updateStatus('WiFi connessione in corso...', ssid, 'searching');
        log('📡 Comando inviato via BLE');
    } else {
        // Se non siamo in BLE, non possiamo configurare WiFi
        log('❌ Per configurare WiFi, connetti prima via BLE o inserisci IP manualmente');
        log('💡 Inserisci l\'IP del dongle (es. 172.20.10.3) nel campo SSID');
    }
}

function setWiFiConnected() {
    connectionMode = 'wifi';
    isConnected = true;
    document.getElementById('btnWiFi').classList.add('connected');
    document.getElementById('statusWiFi').textContent = '✅ Connesso a ' + wifiIP;
    document.getElementById('btnGoToKVM').disabled = false;
    document.getElementById('wifiConfig').classList.remove('show');
    updateStatus('WiFi Connesso', 'IP: ' + wifiIP, 'on');
    log('✅ WiFi Connesso a ' + wifiIP);
    // Salva IP
    localStorage.setItem('kvm_wifi_ip', wifiIP);
}

function updateWiFiStatus() {
    if (connectionMode === 'wifi' || connectionMode === 'ap') {
        const ip = connectionMode === 'ap' ? apIP : wifiIP;
        document.getElementById('statusWiFi').textContent = '✅ Connesso a ' + ip;
        document.getElementById('btnWiFi').classList.add('connected');
    }
}

// ============================================================
// ACCESS POINT
// ============================================================
function connectAP() {
    // L'AP del dongle è sempre su 192.168.4.1
    wifiIP = apIP;
    connectionMode = 'ap';
    isConnected = true;
    document.getElementById('btnAP').classList.add('connected');
    document.getElementById('statusAP').textContent = '✅ Connesso a ' + apIP;
    document.getElementById('btnGoToKVM').disabled = false;
    updateStatus('Access Point', 'IP: ' + apIP, 'on');
    log('✅ Access Point connesso a ' + apIP);
    localStorage.setItem('kvm_wifi_ip', apIP);
}

// ============================================================
// FUNZIONE INVIA UNIFICATA
// ============================================================
function invia(cmd) {
    console.log("📤 Invio:", cmd);
    
    if (connectionMode === 'ble' && bleConnected) {
        sendBLE(cmd);
        return;
    }
    
    if (connectionMode === 'wifi' || connectionMode === 'ap') {
        const ip = connectionMode === 'ap' ? apIP : wifiIP;
        fetch('http://' + ip + '/api?run=' + encodeURIComponent(cmd))
            .then(r => r.json())
            .then(data => {
                if (data.status === 'ok') log('📡 ' + connectionMode.toUpperCase() + ' ▶ ' + cmd);
                else log('❌ Errore: ' + cmd);
            })
            .catch(err => log('❌ Errore rete: ' + err.message));
        return;
    }
    
    log('❌ Nessuna connessione attiva');
}

// ============================================================
// GESTIONE RISPOSTE BLE
// ============================================================
function handleBLEResponse(data) {
    console.log("🔵 BLE data:", data);
    
    if (data.startsWith('MACRO_START:')) {
        bleChunkBuffer.macro = '';
        log('📥 Ricezione macro...');
        return;
    }
    if (data.startsWith('MACRO_DATA:')) {
        bleChunkBuffer.macro += data.substring(11);
        return;
    }
    if (data === 'MACRO_END') {
        try {
            const raw = JSON.parse(bleChunkBuffer.macro || '[]');
            macroCustom = raw.map(m => ({ nome: m.nome || m.n || '', seq: m.seq || m.s || '' }));
            log('✅ Macro caricate: ' + macroCustom.length);
        } catch(err) { log('❌ JSON macro: ' + err.message); }
        bleChunkBuffer.macro = '';
        return;
    }
    
    if (data.startsWith('CRED_START:')) {
        bleChunkBuffer.cred = '';
        log('📥 Ricezione credenziali...');
        return;
    }
    if (data.startsWith('CRED_DATA:')) {
        bleChunkBuffer.cred += data.substring(10);
        return;
    }
    if (data === 'CRED_END') {
        try {
            const raw = JSON.parse(bleChunkBuffer.cred || '[]');
            credenziali = raw.map(c => ({ nome: c.nome || c.n || '', user: c.user || c.u || '', pass: c.pass || c.p || '' }));
            log('✅ Credenziali caricate: ' + credenziali.length);
        } catch(err) { log('❌ JSON cred: ' + err.message); }
        bleChunkBuffer.cred = '';
        return;
    }
    
    if (data.startsWith('MACRO_SAVED:')) { log('✅ Macro salvata: ' + data.substring(12)); return; }
    if (data.startsWith('MACRO_DELETED:')) { log('🗑️ Macro eliminata: ' + data.substring(14)); return; }
    if (data.startsWith('CRED_SAVED:')) { log('✅ Credenziale salvata: ' + data.substring(11)); return; }
    if (data.startsWith('CRED_DELETED:')) { log('🗑️ Cred eliminata: ' + data.substring(13)); return; }
    if (data.startsWith('ERR:')) { log('❌ ' + data); return; }
    
    // WiFi responses
    if (data.startsWith('WIFI_SCAN:')) {
        try {
            const json = data.substring(10);
            const obj = JSON.parse(json);
            displayScanResults(obj.networks);
            log('✅ Scansione completata: ' + (obj.networks ? obj.networks.length : 0) + ' reti trovate');
        } catch(e) {
            console.error('Parse scan error:', e);
        }
        return;
    }
    
    if (data.startsWith('WIFI_NETWORKS:')) {
        try {
            const json = data.substring(14);
            const nets = JSON.parse(json);
            displayNetworks(nets);
        } catch(e) { console.error('Parse networks error:', e); }
        return;
    }
    
    if (data.startsWith('WIFI:')) {
        try {
            const json = data.substring(5);
            const obj = JSON.parse(json);
            document.getElementById('statusDetail').textContent = '📶 ' + obj.mode + ' | ' + obj.ip;
            // Aggiorna stato WiFi
            if (obj.mode === 'STA') {
                document.getElementById('btnWiFi').classList.add('connected');
                document.getElementById('statusWiFi').textContent = '✅ Connesso a ' + obj.ssid;
            }
            if (obj.mode === 'AP') {
                document.getElementById('btnAP').classList.add('connected');
                document.getElementById('statusAP').textContent = '✅ AP: ' + obj.ssid;
            }
        } catch(e) { console.error('WiFi parse error:', e); }
        return;
    }
    
    if (!data.startsWith('OK:M') && !data.startsWith('WIFI:')) {
        log('◀ ' + data);
    }
}

// ============================================================
// SCANSIONE RETI
// ============================================================
function scanNetworks() {
    const results = document.getElementById('scanResults');
    results.innerHTML = '🔍 Scansione in corso...';
    
    if (connectionMode === 'wifi' || connectionMode === 'ap') {
        const ip = connectionMode === 'ap' ? apIP : wifiIP;
        fetch('http://' + ip + '/scan')
            .then(r => r.json())
            .then(data => {
                displayScanResults(data.networks);
            })
            .catch(err => {
                results.innerHTML = '❌ Errore scansione: ' + err.message;
            });
    } else if (connectionMode === 'ble' && bleConnected) {
        sendBLE('WIFI_SCAN');
        log('📡 Scansione reti WiFi via BLE...');
        results.innerHTML = '🔍 Scansione in corso via BLE...';
    } else {
        results.innerHTML = '❌ Connetti prima il dongle';
    }
}

function displayScanResults(networks) {
    const container = document.getElementById('scanResults');
    container.innerHTML = '';
    if (!networks || networks.length === 0) {
        container.innerHTML = '📡 Nessuna rete trovata';
        return;
    }
    networks.sort((a, b) => b.rssi - a.rssi);
    networks.forEach(n => {
        const div = document.createElement('div');
        div.className = 'net';
        let signalIcon = n.rssi > -50 ? '🟢' : n.rssi > -65 ? '🟡' : '🔴';
        let security = n.encryption === 0 ? '🔓' : '🔒';
        div.innerHTML = `
            <span class="ssid">${signalIcon} ${n.ssid} ${security}</span>
            <span style="font-size:10px;color:var(--muted);">${n.rssi} dBm</span>
            <button class="btn-sm btn-success" onclick="selectNetwork('${n.ssid}')">Seleziona</button>
        `;
        container.appendChild(div);
    });
}

function selectNetwork(ssid) {
    document.getElementById('wifiSsid').value = ssid;
    document.getElementById('wifiPass').focus();
    log('📡 SSID selezionato: ' + ssid + ' - Inserisci password');
}

function displayNetworks(nets) {
    const container = document.getElementById('wifiNetworks');
    container.innerHTML = '';
    if (nets && nets.length > 0) {
        nets.forEach(n => {
            const div = document.createElement('div');
            div.className = 'net';
            div.innerHTML = `
                <span class="ssid">📶 ${n.ssid}</span>
                <button class="btn-sm btn-success" onclick="selectNetwork('${n.ssid}')">Seleziona</button>
            `;
            container.appendChild(div);
        });
    } else {
        container.innerHTML = '<div style="color:var(--muted);font-size:11px;padding:4px;">Nessuna rete salvata</div>';
    }
}

// ============================================================
// FUNZIONI KVM (wrapper per invia)
// ============================================================
function inviaMovimento(mx, my) {
    if (stopTimeout) { clearTimeout(stopTimeout); stopTimeout = null; }
    lastMoveTime = Date.now();
    invia('M:' + mx + ',' + my);
}

function fermaCursore() {
    if (stopTimeout) { clearTimeout(stopTimeout); stopTimeout = null; }
    const elapsed = Date.now() - lastMoveTime;
    if (elapsed >= 30) { invia('M:0,0'); return; }
    stopTimeout = setTimeout(() => { invia('M:0,0'); stopTimeout = null; }, 30 - elapsed);
}
